version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - techstore-net
    deploy:
      restart_policy:
        condition: on-failure

  microservicio:
    # Docker Swarm reemplazará esto automáticamente al desplegar si las variables están en el entorno
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/techstore-api:latest
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/techstore
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin123
      # AGREGA LA URL DE LA COLA SQS
      - AWS_SQS_QUEUE_URL=https://sqs.us-east-1.amazonaws.com/989804099124/techstore-audit-queue
    networks:
      - techstore-net
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

networks:
  techstore-net:
    driver: overlay

volumes:
  postgres-data: