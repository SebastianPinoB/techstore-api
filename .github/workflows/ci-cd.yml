name: CI/CD Pipeline TechStore con AWS ECR

on:
  push:
    branches: [ "main" ]

jobs:
  # ETAPA 1: Calidad y Trazabilidad (IE4)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar el entorno de Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y Ejecutar Tests con Maven
      run: mvn clean package -DskipTests

  # ETAPA 2: Provisión Cloud, Construcción y Push a AWS ECR (IE1, IE4, IE5)
  deploy-to-ecr:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # PASO CLAVE PARA IE5: Provisión automática del servicio de registro en la nube
    - name: Verificar o Crear Repositorio en AWS ECR
      run: |
        if ! aws ecr describe-repositories --repository-names techstore-api > /dev/null 2>&1; then
          echo "El repositorio no existe. Creándolo ahora..."
          aws ecr create-repository --repository-name techstore-api
        else
          echo "El repositorio ya existe."
        fi

    - name: Iniciar sesión en AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Construir imagen y subir a AWS ECR
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/techstore-api:latest
          ${{ steps.login-ecr.outputs.registry }}/techstore-api:${{ github.sha }}